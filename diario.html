<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Princesa & Gatinho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Raleway:wght@300;400;700&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="style.css">

	<style>
	body {
    background: #000;
	text-align: center;
	}
	
	.texto-principal {
	    max-width: 800px;
	    width: 100%;
	    text-align: justify;
	}
  .imagem {
    display: block;
    margin: 40px auto; /* espaçamento top e bottom + centraliza */
    max-width: 100%;
    height: auto;
    border-radius: 10px; /* opcional, deixa as bordas arredondadas */
  }

  p {	  
    text-align: justify;
    margin-bottom: 10px; /* espaço entre parágrafos */
  }

	.wrapper {
    max-width: 800px;
    margin: 80px auto 0 auto;    /* centraliza horizontalmente e dá espaço abaixo do header */
    text-align: justify;
}

		
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1001;	
    }
    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 15px;		
      z-index: 1002;
    }

	.modal video {
  max-width: 90%;
  max-height: 90%;
  border-radius: 15px;
  z-index: 1002;
}
.play-icon-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none; 
}
		
.play-icon {
  width: 0;
  height: 0;
  border-left: 25px solid white;
  border-top: 15px solid transparent;
  border-bottom: 15px solid transparent;
  opacity: 0.8;
}
		
  </style>
	
</head>
<body>

  <div class="hearts"></div>
    
    <audio id="musica" autoplay loop>
        <source src="https://raw.githubusercontent.com/LuanMaartins/Princesa/main/Iframe%20Shawn%20Mendes%20-%20Kid%20In%20Love%20(Official%20Audio)%20%5BQiEz1GleIbs%5D.mp3" type="audio/mp3">
        Seu navegador não suporta o elemento de áudio.
    </audio>

    <button class="pause-btn" onclick="toggleAudio()">⏸️</button>

    <header class="menu-fixo">
		<div class="tempo">
			<span class="timer">Tempo juntos: <span id="tempoJuntos"></span></span>
		</div>
	    <h1>Diario</h1>
	</header>

	<div id="modal" class="modal" onclick="fecharModal()">
	    <img id="imgModal" src="" alt="Imagem">
	</div>
	
	<main>
		<div class="wrapper">
			<div class="container active texto-principal">
				
			</div>
		</div>
	</main>
			
		<div id="modal_videos_videos" class="modal">
		    <video id="video_videos_videos" controls>
		        <source src="" type="video/mp4">
		        Seu navegador não suporta vídeo HTML5.
		    </video>
		</div>
  
<button class="voltar-btn" onclick="irParaPagina('index.html')">⬅️</button>
  
  <script src="script.js"></script>
</body>
</html>
